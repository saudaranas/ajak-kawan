<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sertai & Dapat Ganjaran</title>
<style>
  :root { --accent:#e23744; --ink:#1a1a1a; --muted:#666; --bg:#fafafa; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,'Segoe UI',Roboto,sans-serif; background:var(--bg);
         color:var(--ink); line-height:1.5; padding:20px; }
  .wrap { max-width:440px; margin:40px auto; }
  .card { background:#fff; border-radius:16px; padding:28px 24px;
          box-shadow:0 4px 24px rgba(0,0,0,.06); }
  .badge { display:inline-block; background:#fde8ea; color:var(--accent);
           font-size:13px; font-weight:600; padding:5px 12px; border-radius:20px; margin-bottom:16px; }
  h1 { font-size:26px; line-height:1.25; margin-bottom:10px; }
  .sub { color:var(--muted); font-size:15px; margin-bottom:22px; }
  label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
  input { width:100%; padding:13px 14px; border:1.5px solid #e3e3e3; border-radius:10px;
          font-size:16px; outline:none; }
  input:focus { border-color:var(--accent); }
  button { width:100%; margin-top:22px; padding:15px; background:var(--accent); color:#fff;
           border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; }
  button:disabled { opacity:.6; }
  .tiers { margin-top:22px; padding-top:18px; border-top:1px solid #eee; }
  .tiers h3 { font-size:14px; color:var(--muted); margin-bottom:12px; font-weight:600; }
  .tier { display:flex; align-items:center; gap:12px; padding:9px 0; font-size:14px; }
  .tier .n { background:var(--accent); color:#fff; width:30px; height:30px; border-radius:50%;
             display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
  .err { color:var(--accent); font-size:14px; margin-top:10px; text-align:center; }
  .foot { text-align:center; font-size:12px; color:#aaa; margin-top:18px; }
  .loading { text-align:center; color:var(--muted); padding:40px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card">
    <p class="loading">Memuatkan...</p>
  </div>
</div>

<script>
// ====== TUKAR INI ======
const GAS_URL = "https://script.google.com/macros/s/AKfycbx1d5r79Rr8xLFdjW_BkcDOd27ZHO1f_emxeCCwioPc0UqD1MQ5O8fI6-F5V5D9VW9l/exec";
// =======================

const params = new URLSearchParams(location.search);
const campaignId = params.get("id") || "";
const ref = params.get("ref") || "";
const card = document.getElementById("card");

if (!campaignId) {
  card.innerHTML = "<h1>Kempen tak dijumpai</h1><p class='sub'>Link tidak sah.</p>";
} else {
  // Track klik (tak tunggu hasil)
  fetch(GAS_URL + "?action=trackclick&campaign_id=" + encodeURIComponent(campaignId) +
        "&ref=" + encodeURIComponent(ref)).catch(()=>{});
  // Muat config
  fetch(GAS_URL + "?action=config&campaign_id=" + encodeURIComponent(campaignId))
    .then(r => r.json())
    .then(d => {
      if (!d.ok) { card.innerHTML = "<h1>Kempen tak dijumpai</h1>"; return; }
      renderForm(d.config);
    })
    .catch(() => { card.innerHTML = "<h1>Ralat sambungan</h1>"; });
}

function renderForm(c) {
  const tiersHtml = (c.tiers||[]).map(x =>
    `<div class="tier"><span class="n">${x.referrals}</span>
     <div><strong>${esc(x.name)}</strong><br><span style="color:#888;font-size:13px">${esc(x.desc)}</span></div></div>`
  ).join("");

  card.innerHTML = `
    ${c.posterUrl ? `<img src="${esc(c.posterUrl)}" style="width:100%;border-radius:12px;margin-bottom:18px" alt="Poster">` : ""}
    <span class="badge">${esc(c.campaignName||"Ganjaran")}</span>
    <h1>${esc(c.headline||"Ajak kawan, dapat ganjaran.")}</h1>
    <p class="sub">${esc(c.subline||"Daftar, kongsi link, unlock ganjaran.")}</p>
    <div>
      <label>Nama</label>
      <input id="name" type="text" placeholder="Nama anda" autocomplete="name">
      <label>Nombor WhatsApp</label>
      <input id="phone" type="tel" placeholder="0123456789" autocomplete="tel" inputmode="numeric">
      <button id="submit" onclick="submitForm()">Sertai Sekarang</button>
      <p class="err" id="err"></p>
    </div>
    <div class="tiers"><h3>Ganjaran bila ajak kawan:</h3>${tiersHtml}</div>
    <p class="foot">${esc(c.businessName||"")}</p>
  `;
}

function submitForm() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.replace(/[^0-9]/g, "");
  const err = document.getElementById("err");
  const btn = document.getElementById("submit");
  err.textContent = "";
  if (!phone || phone.length < 9) { err.textContent = "Sila masukkan nombor WhatsApp yang sah."; return; }

  btn.disabled = true; btn.textContent = "Memproses...";
  const url = GAS_URL + "?action=signup&campaign_id=" + encodeURIComponent(campaignId) +
              "&name=" + encodeURIComponent(name) + "&phone=" + encodeURIComponent(phone) +
              (ref ? "&ref=" + encodeURIComponent(ref) : "");
  fetch(url).then(r => r.json()).then(d => {
    if (d.ok && d.code) {
      location.href = "share/?id=" + encodeURIComponent(campaignId) + "&code=" + d.code;
    } else {
      err.textContent = d.error || "Ralat. Cuba lagi.";
      btn.disabled = false; btn.textContent = "Sertai Sekarang";
    }
  }).catch(() => {
    err.textContent = "Ralat sambungan. Cuba lagi.";
    btn.disabled = false; btn.textContent = "Sertai Sekarang";
  });
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
</script>
</body>
</html>
